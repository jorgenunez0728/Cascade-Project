<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d2237"/>
      <stop offset="1" stop-color="#05141f"/>
    </linearGradient>
    <linearGradient id="gauge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#10b981"/>
      <stop offset="0.5" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.55">
      <stop offset="0" stop-color="#bb162b" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#bb162b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect width="512" height="512" rx="96" fill="url(#glow)"/>

  <!-- KIA wordmark -->
  <text x="256" y="296" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif"
        font-size="200" font-weight="900" fill="#bb162b" letter-spacing="-8">KIA</text>

  <!-- Emissions gauge bar -->
  <rect x="106" y="370" width="300" height="32" rx="16" fill="url(#gauge)"/>

  <!-- Tick marks on the gauge -->
  <g stroke="#0d2237" stroke-width="2" stroke-linecap="round" opacity="0.45">
    <line x1="181" y1="376" x2="181" y2="396"/>
    <line x1="256" y1="376" x2="256" y2="396"/>
    <line x1="331" y1="376" x2="331" y2="396"/>
  </g>

  <!-- White marker at "in-spec" zone (around 33% of bar = green/amber boundary) -->
  <circle cx="206" cy="386" r="15" fill="#ffffff" stroke="#0d2237" stroke-width="3"/>
  <circle cx="206" cy="386" r="6" fill="#10b981"/>
</svg>
