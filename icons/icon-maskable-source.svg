<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d2237"/>
      <stop offset="1" stop-color="#05141f"/>
    </linearGradient>
    <linearGradient id="gauge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#10b981"/>
      <stop offset="0.5" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.45" r="0.55">
      <stop offset="0" stop-color="#bb162b" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#bb162b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Full-bleed background, no rounded corners — OS will apply mask -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#glow)"/>

  <!-- Content scaled to inner 80% safe zone (51..461) — content spans ~y=130 to y=420 -->
  <text x="256" y="304" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif"
        font-size="160" font-weight="900" fill="#bb162b" letter-spacing="-6">KIA</text>

  <rect x="146" y="362" width="220" height="26" rx="13" fill="url(#gauge)"/>

  <g stroke="#0d2237" stroke-width="1.5" stroke-linecap="round" opacity="0.45">
    <line x1="201" y1="367" x2="201" y2="383"/>
    <line x1="256" y1="367" x2="256" y2="383"/>
    <line x1="311" y1="367" x2="311" y2="383"/>
  </g>

  <circle cx="220" cy="375" r="13" fill="#ffffff" stroke="#0d2237" stroke-width="3"/>
  <circle cx="220" cy="375" r="5" fill="#10b981"/>
</svg>
